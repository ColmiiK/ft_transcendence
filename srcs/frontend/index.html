<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Page</title>
    <link href="css/output.css" rel="stylesheet" />
  </head>
  <body>
    <!-- <div id="particles-js"></div> -->
    <div id="visual-div" class="flex flex-col justify-center items-center">
      <main id="login-page" class="flex flex-col">
        <header id="header-section" class="flex justify-center items-center">
          <h1>Welcome!</h1>
          <img id="login-page-img" src="resources/img/sleeping-cat.png" alt="sleeping cat">
        </header>
        <div id="divider"></div>
        <section id="sign-in">
          <form id="login-form" class="flex flex-col items-center">
            <input type="text" id="login-username" placeholder="Username" class="data-user">
            <input type="password" id="password" placeholder="Password" class="data-user">
            <button type="submit" class="data-user signin-user">Sign in</button>
          </form>      
        </section>
        <p class="flex justify-center">or</p>
        <section id="google-authentication">
          <script src="https://accounts.google.com/gsi/client" async></script>
          <div id="g_id_onload"
              data-client_id="YOUR_GOOGLE_CLIENT_ID"
              data-login_uri="https://your.domain/your_login_endpoint"
              data-auto_prompt="false">
          </div>
          <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </section>
        <section data-dialog-target="sign-in-modal" id="forgot-password" class="flex justify-center"><a href="#">Forgot password?</a></section>
        <section id="sign-up-button" class="flex justify-center">
          <p>Don't have an account? <a href="#" class="text-[var(--dark-pink)]">Sign up</a></p>
        </section>
      </main>
      <main id="sign-up-page" class="flex flex-col">
        <header id="header-section" class="flex justify-center items-center">
          <h1>Create an account</h1>
          <img id="login-page-img" src="resources/img/sleeping-cat.png" alt="sleeping cat">
        </header>
        <div id="divider"></div>
        <section id="sign-up">
          <form id="signup-form" class="flex flex-col items-center">
            <p class="flex justify-start w-full">Username</p>
            <input type="text" id="username" placeholder="username-example123" class="data-user">
            <p class="flex justify-start w-full mt-5">Email</p>
            <input type="email" id="signup-email" placeholder="example@email.com" class="data-user">
            <p class="flex justify-start w-full mt-5">Password</p>
            <input type="password" id="new-password" placeholder="Password" class="data-user">
            <p class="flex justify-start w-full mt-5">Repeat the password</p>
            <input type="password" id="confirm-password" placeholder="Password" class="data-user">
            <div class="create-account">
              <button type="submit" class="data-user signin-user">Create account</button>
              <p>or return to <a href="#" class="text-[var(--dark-pink)]" id="sign-in-button">Sign in</a></p>
            </div>
          </form>
        </section>
        <p class="flex justify-center items-center">By signing up, you agree to our Privacy and Terms Conditions.</p>
      </main>
      <footer id="login-footer" class="flex justify-between gap-x-10">
        <div class="relative inline-block text-left" id="language-menu">
          <div>
            <button type="button" class="inline-flex w-full justify-center gap-x-1.5 rounded-md px-3 py-2 text-sm font-semibold ring-1 shadow-xs ring-gray-300 ring-inset hover:bg-gray-50" id="menu-button" aria-expanded="true" aria-haspopup="true">
              Language
              <svg class="-mr-1 size-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon">
                <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
              </svg>
            </button>
          </div>
        
          <div class="absolute right-0 z-10 mt-2origin-top-right focus:outline-hidden" role="menu" aria-orientation="vertical" aria-labelledby="menu-button" tabindex="-1">
            <div class="hidden py-1" role="none" id="language-options">
              <a href="#" language_key="es" class="l-option block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="menu-item-0">Español</a>
              <a href="#" language_key="en" class="l-option block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="menu-item-1">English</a>
              <a href="#" language_key="fr" class="l-option block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="menu-item-2">Français</a>
            </div>
          </div>
        </div>
        
        <div id="terms-conditions">Privacy and Terms Conditions</div>
      </footer>
    </div>
    <div
  data-dialog-backdrop="sign-in-modal"
  data-dialog-backdrop-close="true"
  class="pointer-events-none fixed inset-0 z-[999] grid h-screen w-screen place-items-center bg-black bg-opacity-60 opacity-0 backdrop-blur-sm transition-opacity duration-300"
>
<div
  data-dialog="sign-in-modal"
  class="relative mx-auto w-full max-w-[24rem] rounded-lg overflow-hidden shadow-sm"
>
  <div class="relative flex flex-col bg-white">
    <div class="relative m-2.5 items-center flex justify-center text-white h-24 rounded-md bg-slate-800">
      <h3 class="text-2xl">
        Recover your password
      </h3>
    </div>
    <div class="flex flex-col gap-4 p-6">
      <div class="w-full max-w-sm min-w-[200px]">
          <label class="block mb-2 text-sm text-slate-600">
            Email
          </label>
          <input type="email" class="w-full bg-transparent placeholder:text-slate-400 text-slate-700 text-sm border border-slate-200 rounded-md px-3 py-2 transition duration-300 ease focus:outline-none focus:border-slate-400 hover:border-slate-300 shadow-sm focus:shadow" placeholder="Your Email" />
      </div>
    </div>
    <div class="p-6 pt-0">
      <button class="w-full rounded-md bg-slate-800 py-2 px-4 border border-transparent text-center text-sm text-white transition-all shadow-md hover:shadow-lg focus:bg-slate-700 focus:shadow-none active:bg-slate-700 hover:bg-slate-700 active:shadow-none disabled:pointer-events-none disabled:opacity-50 disabled:shadow-none" type="button">
        Send email
      </button>
    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="js/init.js"></script>
  <script src="js/loginPage.js"></script>
  <script src="js/fLoginPage.js"></script>
  </body>
</html>
